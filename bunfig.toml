[run]
bun = true

[test]
# Workspace-wide preloads. Per-package bunfig.toml (e.g. packages/oak) extends
# this list, but bun reads the most-specific bunfig only — per-package files
# must re-list this preload if they need it.
preload = ["./tools/test-preload.ts"]

# Files matching these patterns are not picked up as tests
pathIgnorePatterns = [
  "**/build/**",
  ".claude/**",
  "**/*.demo.{js,jsx,ts,tsx,mjs,mts,cjs,cts}",
  "**/*.test-d.ts",
  "**/*.bench-d.ts",
  "tools/oxlint-custom-rules/tests/fixtures/**",
]

# Coverage configuration. Bun uses JSC's native Inspector.Coverage agent —
# no v8/inspector profiler dependency, so this works under bun runtime.
# `text` only — `lcov` adds a file-write step that intermittently fails on
# some bun 1.3.x versions with "WriteFailed". Re-enable with explicit
# coverageDir if a CI integration needs lcov.
coverageReporter = ["text"]
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "**/*.d.ts",
  "**/*.test-d.ts",
  "**/*.bench-d.ts",
  "**/*.test-helpers.ts",
  "**/*.demo.{js,jsx,ts,tsx,mjs,mts,cjs,cts}",
  "**/__tests/**",
  "**/__tests__/**",
  "**/__snapshots__/**",
  "**/__mocks__/**",
  "**/__examples__/**",
  "**/build/**",
  ".claude/**",
  "tools/oxlint-custom-rules/tests/fixtures/**",
]

[test.coverageThreshold]
lines = 0.7
functions = 0.7
