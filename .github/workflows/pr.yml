name: pr
on:
  pull_request: {}
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-type:
    runs-on: ubuntu-latest
    outputs:
      skip-code-checks: ${{ steps.check.outputs.skip-code-checks }}
    steps:
      - name: Check PR title for CC type
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^ci(\(|:) ]]; then
            echo "skip-code-checks=true" >> $GITHUB_OUTPUT
            echo "Skipping code checks (ci): $TITLE"
          elif [[ "$TITLE" =~ ^chore\.docs(\(|:) ]]; then
            echo "skip-code-checks=true" >> $GITHUB_OUTPUT
            echo "Skipping code checks (chore.docs): $TITLE"
          else
            echo "skip-code-checks=false" >> $GITHUB_OUTPUT
            echo "Running full checks for: $TITLE"
          fi

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run format:check

  api-model-style:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Check API model style
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:api-model-style
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  validate-cc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: Validate CC type matches diff
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [[ "${BODY:-}" == *"<!-- cc-bypass -->"* ]]; then
            echo "CC validation bypassed via PR comment"
            exit 0
          fi

          NO_RELEASE_PATTERN="^(chore|style|refactor|test|build|ci|chore\.docs)(\(|:)"

          if [[ "$TITLE" =~ $NO_RELEASE_PATTERN ]]; then
            SRC_CHANGES=$(git diff --name-only "origin/$BASE_REF"...HEAD | grep -E '^packages/[^/]+/src/' || true)

            if [[ -n "$SRC_CHANGES" ]]; then
              echo "::error::CC type mismatch: '$TITLE' won't trigger a release, but src/ files changed"
              echo ""
              echo "Changed files:"
              echo "$SRC_CHANGES" | sed 's/^/  /'
              echo ""
              echo "Fix: Change PR title to a release type (feat:/fix:/perf:/docs:)"
              echo ""
              echo "Bypass: If intentional (e.g., true refactor with no behavior change),"
              echo "add this HTML comment anywhere in the PR body:"
              echo ""
              echo "  <!-- cc-bypass -->"
              echo ""
              exit 1
            fi
          fi

          echo "CC type validated: $TITLE"

  packages-build:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Build packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run build:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-types:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Type check packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:types:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-lint:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Lint packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:lint:packages:type-aware
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  publint:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Check published package shapes
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:package:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-test:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Test packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run test:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  release-plan-comment:
    needs: check-type
    if: needs.check-type.outputs.skip-code-checks != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base and tags
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git fetch --tags --force
      - uses: ./.github/actions/setup
      - name: Build release package
        run: bun run release:build
      - name: Extract publish history from existing comment
        uses: actions/github-script@v7
        id: history
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const marker = '<!-- kitz-release-plan -->'
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            })
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            )

            const historyRe = /<!-- kitz-release-publish-history\n([\s\S]*?)\n-->/
            const match = existing?.body?.match(historyRe)
            const history = match ? match[1] : '{"publishes":[]}'
            fs.writeFileSync('/tmp/publish-history.json', history)
            core.info(`Extracted publish history: ${history.length} bytes`)
      - name: Generate release forecast comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          bun run release:forecast:comment -- --publish-history /tmp/publish-history.json > /tmp/release-plan-comment.md
      - name: Upsert PR release forecast comment
        uses: ./.github/actions/upsert-pr-comment
        with:
          file: /tmp/release-plan-comment.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
