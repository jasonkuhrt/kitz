name: pr
on:
  pull_request: {}
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-type:
    runs-on: ubuntu-latest
    outputs:
      skip-code-checks: ${{ steps.check.outputs.skip-code-checks }}
    steps:
      - name: Check PR title for CC type
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^ci(\(|:) ]]; then
            echo "skip-code-checks=true" >> $GITHUB_OUTPUT
            echo "Skipping code checks (ci): $TITLE"
          elif [[ "$TITLE" =~ ^chore\.docs(\(|:) ]]; then
            echo "skip-code-checks=true" >> $GITHUB_OUTPUT
            echo "Skipping code checks (chore.docs): $TITLE"
          else
            echo "skip-code-checks=false" >> $GITHUB_OUTPUT
            echo "Running full checks for: $TITLE"
          fi

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run format:check

  api-model-style:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Check API model style
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:api-model-style
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-build:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Build packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run build:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-types:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Type check packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:types:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-lint:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Lint packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:lint:packages:type-aware
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  publint:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Check published package shapes
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run check:package:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  packages-test:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - uses: ./.github/actions/setup
        if: needs.check-type.outputs.skip-code-checks != 'true'
      - name: Test packages
        if: needs.check-type.outputs.skip-code-checks != 'true'
        run: bun run test:packages
      - run: echo "Skipped for chore.docs/ci commit"
        if: needs.check-type.outputs.skip-code-checks == 'true'

  release-preview:
    needs: check-type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base and tags
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git fetch --tags --force
      - uses: ./.github/actions/setup
      - name: Run release preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CODE_CHECKS: ${{ needs.check-type.outputs.skip-code-checks }}
        run: |
          if [[ "${SKIP_CODE_CHECKS}" == "true" ]]; then
            bun run release pr preview --check-only
          else
            bun run release pr preview
          fi
