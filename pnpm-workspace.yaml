packages:
  - 'packages/*'

# pnpm 11 global virtual store. Works because the test layer follows the
# idiomatic Vite+ path: tests import from `vite-plus/test` (vite-plus re-exports
# vitest), so resolution goes through `vite-plus` — a properly-declared dep —
# rather than an orphaned `@vitest/runner`. (That orphan, via @effect/vitest, was
# the original GVS blocker.) vitest is owned by vite-plus; we do not install it.
enableGlobalVirtualStore: true

catalog:
  effect: 4.0.0-beta.85
  '@effect/platform-node': 4.0.0-beta.85
  fast-check: ^4.8.0

minimumReleaseAgeExclude:
  - effect@4.0.0-beta.85

allowBuilds:
  msgpackr-extract: false
